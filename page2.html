<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Send Me a Message</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    
    <header>
        <h1>Send Me a Message</h1>
    </header>

    <nav>
        <a href="deswita.html">Home</a> |
        <a href="page2.html">Message</a>
    </nav>

    <main>
        
        <section class="message-box">
            <h2>Send Me a Message</h2>

            <form>
                <label>Nama:</label><br>
                <input type="text" name="nama"><br><br>

                <label>Email:</label><br>
                <input type="email" name="email"><br><br>

                <label>Umur:</label><br>
                <input type="number" name="umur"><br><br>
                
                <label>Bagian apa yang kamu suka dari website ini?</label><br>
                <select name="favorite">
                    <option>About Me</option>
                    <option>My Favorites</option>
                    <option>My Gallery</option>
                    <option>Semuanya</option>
                </select>
                <br><br>

                <label>Pesan:</label><br>
                <textarea name="pesan"></textarea>
                <br><br>
                
                <input type="submit" value="Kirim">

            </form>

        </section>

    </main>

    <footer>
        <p>© 2026 Deswita Salsabila</p>
    </footer>
